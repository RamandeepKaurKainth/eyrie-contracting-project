<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Eyrie Contracting Inc.</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap (hamburger toggle only) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AOS (scroll animations) -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <style>
        html { scroll-behavior: smooth; }

        /* Parallax effect */
        .parallax {
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>


<body class="bg-gray-100">

    <!-- HEADER (injected) -->
    <div id="header-placeholder"></div>
    <div id="panel-placeholder"></div>

    <!-- HERO (VIDEO) -->
    <section class="relative h-[70vh] overflow-hidden">
        
        <!-- BG VIDEO -->
        <video 
            class="absolute inset-0 w-full h-full object-cover"
            autoplay 
            muted 
            loop 
            playsinline>
            <source src="videos/placeholder_video2.mp4" type="video/mp4">
        </video>

        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/60"></div>

        <div class="relative z-10 h-full flex flex-col justify-center items-center text-center px-6"
             data-aos="fade-up" data-aos-duration="1200">
            <h1 class="text-white text-5xl md:text-6xl font-extrabold uppercase tracking-wide">
                Our Work
            </h1>
            <div class="w-24 h-1 bg-orange-500 mt-4"></div>

            <p class="text-gray-200 max-w-2xl mt-6 text-lg leading-relaxed">
                Explore the craftsmanship, precision, and innovation behind every project we deliver.
            </p>
        </div>
    </section>


    <!-- GALLERY GRID -->
    <section class="container mx-auto px-6 py-20">
        <div id="gallery-list" class="space-y-10"
             data-aos="fade-up" data-aos-duration="1000"></div>
    </section>


    <!-- LIGHTBOX -->
    <div id="lightbox" class="fixed inset-0 bg-black/80 hidden z-50 
        flex items-center justify-center p-4">

        <button id="closeBtn" class="absolute top-6 right-6 text-white text-4xl">&times;</button>

        <button id="prevBtn" class="absolute left-6 text-white text-4xl">&#10094;</button>
        <button id="nextBtn" class="absolute right-6 text-white text-4xl">&#10095;</button>

        <img id="lightboxImg" class="max-h-[80vh] max-w-[80vw] rounded-xl shadow-2xl object-contain">
    </div>


    <!-- UNIFIED CTA SECTION -->
    <section class="relative h-[55vh] bg-cover bg-center mt-24 parallax"
             style="background-image: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');">

        <div class="absolute inset-0 bg-gradient-to-b from-black/70 to-black/40"></div>

        <div class="relative z-10 h-full flex flex-col justify-center items-center text-center px-6"
             data-aos="fade-up" data-aos-duration="1200">

            <h2 class="text-white text-4xl md:text-5xl font-extrabold tracking-wide uppercase">
                Ready to Start Your Project?
            </h2>

            <div class="w-24 h-1 bg-orange-500 mt-4 mb-6"></div>

            <p class="text-gray-200 max-w-xl leading-relaxed text-lg">
                Let’s bring your vision to life with quality craftsmanship and reliable service.
            </p>

            <div class="mt-8 flex space-x-4">
                <a href="contact.html"
                   class="bg-orange-500 text-white px-8 py-3 rounded-lg shadow-lg hover:bg-orange-600 transition">
                    Request a Free Quote
                </a>

                <a href="services.html"
                   class="bg-gray-200 text-gray-800 px-8 py-3 rounded-lg shadow hover:bg-gray-300 transition">
                    Explore Our Services
                </a>
            </div>

        </div>
    </section>


    <!-- JS FILES -->
    <script src="js/header.js"></script>
    <script src="js/gallery.js"></script>

    <!-- AOS SCRIPT -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>

</body>
</html>

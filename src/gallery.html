<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Eyrie Contracting Inc.</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Shared Site CSS -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/links.css" />
    <link rel="stylesheet" href="css/buttons.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/gallery.css" />

    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

    <style>
        html {
            scroll-behavior: smooth;
        }

        .parallax {
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800">

    <!-- HEADER -->
    <div id="header-placeholder"></div>
    <div id="panel-placeholder"></div>

    <!-- HERO -->
    <section class="relative h-[70vh] parallax"
        style="background-image: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');">

        <div class="absolute inset-0 bg-black/60"></div>

        <div class="relative z-10 h-full flex flex-col justify-center items-center text-center px-6" data-aos="fade-up"
            data-aos-duration="1200">
            <h1 class="text-white text-5xl md:text-6xl font-extrabold uppercase tracking-wide">
                Our Work
            </h1>

            <div class="w-24 h-1 bg-orange-500 mt-4"></div>

            <p class="text-gray-200 max-w-2xl mt-6 text-lg leading-relaxed">
                Explore the craftsmanship, precision, and innovation behind every project we deliver.
            </p>
        </div>
    </section>

    <!-- GALLERY GRID -->
    <section class="container mx-auto px-6 py-20">
        <div id="gallery-list" class="space-y-10" data-aos="fade-up" data-aos-duration="1000"></div>
    </section>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">

        <button id="closeBtn" class="absolute top-6 right-6 text-white text-4xl">
            &times;
        </button>

        <button id="prevBtn" class="absolute left-6 text-white text-4xl">
            &#10094;
        </button>

        <button id="nextBtn" class="absolute right-6 text-white text-4xl">
            &#10095;
        </button>

        <img id="lightboxImg" class="max-h-[80vh] max-w-[80vw] rounded-xl shadow-2xl object-contain"
            alt="Gallery preview">
    </div>

    <!-- CTA -->
    <div id="footer-placeholder"></div>

    <!-- JS FILES -->
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/gallery.js"></script>

    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>

</body>

</html>

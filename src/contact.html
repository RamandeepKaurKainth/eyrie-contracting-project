<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us | Request a Quote</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap CSS (this defines the font) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />

  <link rel="stylesheet" href="css/style.css" />

  <!-- Optional: ensure everything inherits Bootstrap font -->
  <style>
    body {
      font-family: inherit;
    }
  </style>
</head>


<body>
  <div id="menu-placeholder"></div>

  <div class="container-fluid py-5 px-4">
    <div class="row g-4">

      <!-- LEFT: Contact Form -->
      <div class="col-12 col-lg-7">
        <div>
          <div class="card-body p-4">

            <h2 class="mb-3 text-start display-6">Request a Quote</h2>

            <form id="contactForm" enctype="multipart/form-data">
              <div class="row">

                <!-- Inquiry -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">Select Inquiry*</label>
                  <select class="form-select" required>
                    <option value="">Select</option>
                    <option value="quote">Request a Quote</option>
                    <option value="general">General Inquiry</option>
                    <option value="support">Support</option>
                  </select>
                </div>

                <!-- Category -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">Select Category*</label>
                  <select class="form-select" required>
                    <option value="">Select</option>
                    <option value="residential">Residential</option>
                    <option value="commercial">Commercial</option>
                    <option value="other">Other</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <!-- First Name -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">First Name*</label>
                  <input type="text" class="form-control" placeholder="e.g. John" required />
                </div>

                <!-- Last Name -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">Last Name*</label>
                  <input type="text" class="form-control" placeholder="e.g. Smith" required />
                </div>
              </div>

              <div class="row">
                <!-- Phone -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">Phone Number*</label>
                  <input type="tel" class="form-control" placeholder="e.g. +132437436" required />
                </div>

                <!-- Email -->
                <div class="col-md-6 mb-3">
                  <label class="form-label">Email Address*</label>
                  <input type="email" class="form-control" placeholder="e.g. john@youremail.com" required />
                </div>
              </div>

              <!-- Description -->
              <div class="mb-3">
                <label class="form-label">Description*</label>
                <textarea class="form-control" rows="4" placeholder="Tell us about your project..." required></textarea>
              </div>

              <!-- Attachment -->
              <div class="mb-4">
                <label class="form-label">Attachment (optional)</label>
                <input type="file" class="form-control" accept=".jpg,.png,.pdf,.doc,.docx" />
                <div class="form-text">
                  Accepted formats: JPG, PNG, PDF, DOC, DOCX
                </div>
              </div>

              <!-- Submit -->
              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">
                  Submit Request
                </button>
              </div>

            </form>

          </div>
        </div>

      </div>
      <!-- RIGHT: Company Info -->
      <div class="col-12 col-lg-5">
        <div>
          <div class="card-body p-4">
            <h2 class="mb-3 text-start display-6">Our Office</h2>

            <h4 class="mb-3" id="companyName"></h4>
            <p class="mb-3" id="country"></p>

            <!-- Office Address -->
            <div class="mb-3">
              <strong>Office</strong><br>
              <span id="address1"></span><br>
              <span id="city"></span>, <span id="province"></span><br>
              <span id="postalCode"></span>
            </div>

            <!-- Phone -->
            <div class="mb-3">
              <strong>Phone</strong><br>
              <a id="phoneLink" href="#" class="text-link">
                <span id="phone"></span>
              </a>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <strong>Email</strong><br>
              <a id="emailLink" href="#" class="text-link">
                <span id="email"></span>
              </a>
            </div>

            <hr>

            <p class="text-muted small">
              Business Hours<br>
            <p id="officeHour"></p>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Simple JS handler -->
  <script type="module" src="js/contact.js"></script>
  <script type="text/javascript" src="https://seal-mbc.bbb.org/inc/legacy.js"></script><a href="https://www.bbb.org/ca/bc/mission/profile/general-contractor/eyrie-contracting-inc-0037-2437700/#sealclick" id="bbblink" class="ruvtbum" target="_blank" rel="nofollow"><img src="https://seal-mbc.bbb.org/logo/ruvtbum/bbb-2437700.png" style="border: 0;" alt="Eyrie Contracting Inc. BBB Business Review" /></a>

</body>

</html>
